<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sajom Business Dashboard 🕶️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f8fafc; }
        .glass { background: white; border-radius: 1rem; border: 1px solid #e2e8f0; box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1); }
        /* Fix radical pour Chart.js */
        .chart-wrapper {
            position: relative;
            height: 250px !important;
            width: 100% !important;
        }
    </style>
</head>
<body class="text-slate-900 font-sans">
    <div class="max-w-7xl mx-auto p-4 md:p-8">
        <header class="mb-10 text-center md:text-left">
            <h1 class="text-3xl font-black text-slate-900">CLAW ANALYTICS 🕶️</h1>
            <p class="text-slate-500 font-medium">Suivi Business de Sajom | 2025-2026</p>
        </header>

        <!-- Stats -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
            <div class="glass p-6">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Bénéfice Net</p>
                <p class="text-3xl font-black text-blue-600">1 142,40 €</p>
            </div>
            <div class="glass p-6">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Ventes</p>
                <p class="text-3xl font-black text-slate-900">82</p>
            </div>
            <div class="glass p-6">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">En Stock</p>
                <p class="text-3xl font-black text-slate-900">46</p>
            </div>
            <div class="glass p-6">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Dons/Pertes</p>
                <p class="text-3xl font-black text-red-500">31</p>
            </div>
        </div>

        <!-- Graphiques -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10">
            <div class="glass p-6">
                <h3 class="font-bold text-slate-800 mb-6">Profit par Fournisseur</h3>
                <div class="chart-wrapper">
                    <canvas id="providerChart"></canvas>
                </div>
            </div>
            <div class="glass p-6">
                <h3 class="font-bold text-slate-800 mb-6">Canaux de Vente</h3>
                <div class="chart-wrapper">
                    <canvas id="channelChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Table -->
        <div class="glass overflow-hidden">
            <div class="p-6 border-b border-slate-100 font-bold text-lg">Derniers Mouvements</div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-50 text-slate-400 text-xs uppercase">
                            <th class="px-6 py-4">Produit</th>
                            <th class="px-6 py-4">Source</th>
                            <th class="px-6 py-4 text-right">Net (€)</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        <tr>
                            <td class="px-6 py-4 font-medium italic">Gants Noirs Sugargoo1</td>
                            <td class="px-6 py-4 text-slate-500">Yuan Ying</td>
                            <td class="px-6 py-4 text-right text-green-600 font-bold">+28.70</td>
                        </tr>
                        <tr>
                            <td class="px-6 py-4 font-medium italic">Ensemble OM Noir XL</td>
                            <td class="px-6 py-4 text-slate-500">Jersey Dong</td>
                            <td class="px-6 py-4 text-right text-slate-400">-</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const commonOptions = {
            responsive: true,
            maintainAspectRatio: false,
            animation: false, // Désactive l'animation pour éviter les bugs de resizing
            plugins: { legend: { position: 'bottom' } }
        };

        new Chart(document.getElementById('providerChart'), {
            type: 'bar',
            data: {
                labels: ['Jersey Dong', 'Taobao', 'Yuan Ying', 'Aliexpress', 'TikTok', 'Amazon'],
                datasets: [{
                    label: 'Profit',
                    data: [450, 280, 180, 10, 50, 160],
                    backgroundColor: '#3b82f6'
                }]
            },
            options: commonOptions
        });

        new Chart(document.getElementById('channelChart'), {
            type: 'pie',
            data: {
                labels: ['Vinted', 'Main Propre', 'Leboncoin', 'Dons'],
                datasets: [{
                    data: [65, 15, 10, 22],
                    backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444']
                }]
            },
            options: commonOptions
        });
    </script>
</body>
</html>
