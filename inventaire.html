<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventaire Pro - Sajom Business 🕶️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; }
        .filter-active { background-color: #3b82f6 !important; color: white !important; }
        .table-container { max-height: 70vh; overflow-y: auto; }
        thead th { sticky: top; top: 0; background: #f8fafc; z-index: 10; }
    </style>
</head>
<body class="text-slate-900 font-sans pb-10">
    <nav class="bg-slate-900 text-white p-4 sticky top-0 z-50">
        <div class="max-w-[1600px] mx-auto flex justify-between items-center">
            <h1 class="font-black tracking-tighter uppercase">CLAW ANALYTICS 🕶️</h1>
            <div class="space-x-4 text-sm font-bold">
                <a href="index.html" class="hover:text-blue-400 text-slate-400">Dashboard</a>
                <a href="inventaire.html" class="text-white border-b-2 border-blue-500 pb-1">Inventaire</a>
            </div>
        </div>
    </nav>

    <div class="max-w-[1600px] mx-auto p-4 md:p-6">
        <!-- Barre de recherche et filtres rapides -->
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 mb-6 flex flex-wrap gap-4 items-center justify-between">
            <div class="flex flex-wrap gap-2">
                <input type="text" id="searchInput" onkeyup="applyFilters()" placeholder="Rechercher un produit..." class="px-4 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 w-64">
                <select id="sourceFilter" onchange="applyFilters()" class="px-4 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none">
                    <option value="all">Toutes les sources</option>
                    <option value="Taobao">Taobao</option>
                    <option value="Jersey Dong">Jersey Dong</option>
                    <option value="Yuan Ying">Yuan Ying</option>
                    <option value="TikTok">TikTok</option>
                    <option value="Amazon">Amazon</option>
                </select>
            </div>
            <div class="flex bg-slate-100 p-1 rounded-xl">
                <button onclick="setStatusFilter('all')" class="status-btn filter-active px-4 py-2 rounded-lg text-[10px] font-black uppercase transition-all">TOUT</button>
                <button onclick="setStatusFilter('vendu')" class="status-btn px-4 py-2 rounded-lg text-[10px] font-black uppercase transition-all">VENDU</button>
                <button onclick="setStatusFilter('en-stock')" class="status-btn px-4 py-2 rounded-lg text-[10px] font-black uppercase transition-all">STOCK</button>
                <button onclick="setStatusFilter('donne')" class="status-btn px-4 py-2 rounded-lg text-[10px] font-black uppercase transition-all">DONNÉ</button>
            </div>
        </div>

        <!-- Table Master -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto table-container">
                <table class="w-full text-left border-collapse" id="masterTable">
                    <thead>
                        <tr class="text-slate-400 text-[10px] uppercase tracking-widest border-b border-slate-100">
                            <th class="px-4 py-4 font-bold">Statut</th>
                            <th class="px-4 py-4 font-bold">Produit</th>
                            <th class="px-4 py-4 font-bold">Source / Commande</th>
                            <th class="px-4 py-4 font-bold text-center">Date Achat</th>
                            <th class="px-4 py-4 font-bold text-right">Achat (€)</th>
                            <th class="px-4 py-4 font-bold text-right">Vente (€)</th>
                            <th class="px-4 py-4 font-bold text-right">Net (€)</th>
                            <th class="px-4 py-4 font-bold text-center">Date Vente</th>
                            <th class="px-4 py-4 font-bold">Lieu</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-50 text-[11px] md:text-xs">
                        <!-- Injection dynamique -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const products = [
            // --- 2026 ---
            { status: 'vendu', name: 'Gants noirs Taille 8', source: 'Yuan Ying', cmd: 'ACBUY', dateAchat: '04/11/2025', buy: 17.7, sell: 40, net: 22.3, dateVente: '06/02/2026', lieu: 'vinted' },
            { status: 'vendu', name: 'Gants noirs Taille 8', source: 'Yuan Ying', cmd: 'ACBUY', dateAchat: '04/11/2025', buy: 17.7, sell: 40, net: 22.3, dateVente: '10/02/2026', lieu: 'vinted' },
            { status: 'donne', name: 'Ensemble training OM Menthe M', source: 'Jersey Dong', cmd: 'JD5', dateAchat: '07/11/2025', buy: 22, sell: 0, net: -22, dateVente: '01/02/2026', lieu: 'Jems' },
            { status: 'vendu', name: 'Ensemble training OM Menthe M', source: 'Jersey Dong', cmd: 'JD5', dateAchat: '07/11/2025', buy: 22, sell: 50, net: 28, dateVente: '25/02/2026', lieu: 'vinted' },
            { status: 'vendu', name: 'Ensemble training OM Menthe L', source: 'Jersey Dong', cmd: 'JD5', dateAchat: '07/11/2025', buy: 22, sell: 49.5, net: 27.5, dateVente: '07/02/2026', lieu: 'vinted' },
            { status: 'en-stock', name: 'Ensemble training OM Menthe XL', source: 'Jersey Dong', cmd: 'JD5', dateAchat: '07/11/2025', buy: 22, sell: 0, net: 0, dateVente: '-', lieu: '-' },
            { status: 'en-stock', name: 'Ensemble training OM Noir XL (x10)', source: 'Jersey Dong', cmd: 'JD6', dateAchat: '28/12/2025', buy: 22, sell: 0, net: 0, dateVente: '-', lieu: '-' },

            // --- 2025 (Extraits représentatifs) ---
            { status: 'vendu', name: 'Maillot City', source: 'Taobao', cmd: 'TAO1', dateAchat: '13/05/2025', buy: 9.6, sell: 20, net: 10.4, dateVente: '20/05/2025', lieu: 'vinted' },
            { status: 'vendu', name: 'Vidéo Projecteur', source: 'TikTok', cmd: 'Tkt2', dateAchat: '01/07/2025', buy: 22.8, sell: 50, net: 27.2, dateVente: '15/07/2025', lieu: 'Facebook' },
            { status: 'vendu', name: 'Vidéo Projecteur (Amazon Test)', source: 'Amazon', cmd: 'Amz1', dateAchat: '01/07/2025', buy: 0, sell: 60, net: 60, dateVente: '05/07/2025', lieu: 'LBC' },
            { status: 'vendu', name: 'Gants Predator', source: 'Taobao', cmd: 'TAO3', dateAchat: '07/08/2025', buy: 18.26, sell: 50, net: 30.37, dateVente: '20/08/2025', lieu: 'vinted' },
            { status: 'donne', name: 'Veste Patagonia Reversible', source: 'Jetlife', cmd: 'Sug2', dateAchat: '06/11/2025', buy: 52, sell: 0, net: -52, dateVente: '-', lieu: 'Perso' },
            { status: 'vendu', name: 'Ensemble Real Bleu M', source: 'Jersey Dong', cmd: 'JD1', dateAchat: '08/09/2025', buy: 9.2, sell: 30, net: 20.8, dateVente: '30/11/2025', lieu: 'vinted' },
            { status: 'en-stock', name: 'Batterie Magsafe (x5)', source: 'Taobao', cmd: 'TAO1', dateAchat: '13/05/2025', buy: 9.6, sell: 0, net: 0, dateVente: '-', lieu: '-' }
        ];

        let currentStatusFilter = 'all';

        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const sourceTerm = document.getElementById('sourceFilter').value;
            const tbody = document.querySelector('#masterTable tbody');
            tbody.innerHTML = '';

            const filtered = products.filter(p => {
                const matchesSearch = p.name.toLowerCase().includes(searchTerm);
                const matchesSource = sourceTerm === 'all' || p.source === sourceTerm;
                const matchesStatus = currentStatusFilter === 'all' || p.status === currentStatusFilter;
                return matchesSearch && matchesSource && matchesStatus;
            });

            filtered.forEach(p => {
                const statusColor = p.status === 'vendu' ? 'bg-green-100 text-green-700' : 
                                    p.status === 'donne' ? 'bg-red-100 text-red-700' : 'bg-blue-100 text-blue-700';
                
                const netColor = p.net > 0 ? 'text-green-600 font-bold' : 
                                 p.net < 0 ? 'text-red-600 font-bold' : 'text-slate-400';

                const row = `
                    <tr class="hover:bg-blue-50/50 transition-colors">
                        <td class="px-4 py-3"><span class="${statusColor} px-2 py-0.5 rounded text-[9px] font-black uppercase">${p.status}</span></td>
                        <td class="px-4 py-3 font-medium">${p.name}</td>
                        <td class="px-4 py-3 text-slate-400 text-[10px]"><span class="text-slate-900 font-bold">${p.source}</span> / ${p.cmd}</td>
                        <td class="px-4 py-3 text-center text-slate-500">${p.dateAchat}</td>
                        <td class="px-4 py-3 text-right font-mono">${p.buy.toFixed(2)}€</td>
                        <td class="px-4 py-3 text-right font-mono">${p.sell > 0 ? p.sell.toFixed(2) + '€' : '-'}</td>
                        <td class="px-4 py-3 text-right font-mono ${netColor}">${p.net !== 0 ? (p.net > 0 ? '+' : '') + p.net.toFixed(2) + '€' : '-'}</td>
                        <td class="px-4 py-3 text-center text-slate-500">${p.dateVente}</td>
                        <td class="px-4 py-3 text-slate-600 font-medium">${p.lieu}</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        function setStatusFilter(status) {
            currentStatusFilter = status;
            document.querySelectorAll('.status-btn').forEach(btn => {
                btn.classList.remove('filter-active');
                if(btn.innerText.toLowerCase() === status.replace('-', ' ').toLowerCase() || (status === 'all' && btn.innerText === 'TOUT')) {
                    btn.classList.add('filter-active');
                }
            });
            applyFilters();
        }

        window.onload = applyFilters;
    </script>
</body>
</html>
