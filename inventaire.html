<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventaire Complet - Sajom Business 🕶️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; }
        .filter-btn.active { background-color: #0f172a; color: white; }
    </style>
</head>
<body class="text-slate-900 font-sans pb-20">
    <nav class="bg-slate-900 text-white p-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="font-black tracking-tighter">CLAW ANALYTICS 🕶️</h1>
            <div class="space-x-4 text-sm font-bold">
                <a href="index.html" class="hover:text-blue-400 text-slate-400">Dashboard</a>
                <a href="inventaire.html" class="text-white border-b-2 border-blue-500 pb-1">Inventaire</a>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-4 md:p-8">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-end gap-4">
            <div>
                <h2 class="text-3xl font-black text-slate-900 uppercase">Inventaire Global</h2>
                <p class="text-slate-500 font-medium">Gestion et filtrage de l'ensemble du stock</p>
            </div>
            <div class="flex bg-white p-1 rounded-xl border border-slate-200 shadow-sm">
                <button onclick="filterStatus('all')" class="filter-btn active px-4 py-2 rounded-lg text-xs font-bold transition-all">TOUT</button>
                <button onclick="filterStatus('en-stock')" class="filter-btn px-4 py-2 rounded-lg text-xs font-bold transition-all">EN STOCK</button>
                <button onclick="filterStatus('vendu')" class="filter-btn px-4 py-2 rounded-lg text-xs font-bold transition-all">VENDU</button>
                <button onclick="filterStatus('donne')" class="filter-btn px-4 py-2 rounded-lg text-xs font-bold transition-all">DONNÉ</button>
            </div>
        </header>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse" id="inventoryTable">
                    <thead>
                        <tr class="bg-slate-50 text-slate-400 text-[10px] uppercase tracking-widest">
                            <th class="px-6 py-4 border-b">Statut</th>
                            <th class="px-6 py-4 border-b">Produit</th>
                            <th class="px-6 py-4 border-b">Source</th>
                            <th class="px-6 py-4 border-b">Prix Achat</th>
                            <th class="px-6 py-4 border-b">Prix Vente</th>
                            <th class="px-6 py-4 border-b text-right">Net</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100 text-sm">
                        <!-- Les données seront injectées ici par le script -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const products = [
            // 2026
            { status: 'vendu', name: 'Gants noirs Taille 8', source: 'Yuan Ying', buy: 17.7, sell: 40, net: 22.3 },
            { status: 'donne', name: 'Training OM Menthe M', source: 'Jersey Dong', buy: 22, sell: 0, net: -22 },
            { status: 'vendu', name: 'Training OM Menthe M', source: 'Jersey Dong', buy: 22, sell: 50, net: 28 },
            { status: 'vendu', name: 'Training OM Menthe L', source: 'Jersey Dong', buy: 22, sell: 49.5, net: 27.5 },
            { status: 'en-stock', name: 'Training OM Menthe XL', source: 'Jersey Dong', buy: 22, sell: 0, net: 0 },
            { status: 'en-stock', name: 'Training OM Noir XL (x10)', source: 'Jersey Dong', buy: 22, sell: 0, net: 0 },
            
            // 2025 Extract
            { status: 'vendu', name: 'Vidéo Projecteur (Amazon Test)', source: 'Amazon', buy: 0, sell: 100, net: 100 },
            { status: 'vendu', name: 'Gants Predator', source: 'Taobao', buy: 18.26, sell: 50, net: 30.37 },
            { status: 'donne', name: 'Veste Patagonia Reversible', source: 'Jetlife', buy: 52, sell: 0, net: -52 },
            { status: 'vendu', name: 'Maillot Real Rose', source: 'Taobao', buy: 9.6, sell: 20, net: 10.4 },
            { status: 'en-stock', name: 'Batterie Magsafe 20000 (x5)', source: 'Taobao', buy: 9.6, sell: 0, net: 0 },
            { status: 'vendu', name: 'Ecouteurs SONY', source: 'Aliexpress', buy: 5, sell: 15, net: 10 },
            { status: 'en-stock', name: 'Gants bleu 8', source: 'Taobao', buy: 15, sell: 0, net: -15 },
            { status: 'vendu', name: 'Ensemble Real Bleu M', source: 'Jersey Dong', buy: 9.2, sell: 30, net: 20.8 },
            { status: 'donne', name: 'Maillot Barca Noir', source: 'Jersey Dong', buy: 9.2, sell: 0, net: -9.2 }
        ];

        function renderTable(filter = 'all') {
            const tbody = document.querySelector('#inventoryTable tbody');
            tbody.innerHTML = '';
            
            products.forEach(p => {
                if (filter !== 'all' && p.status !== filter) return;

                const statusColor = p.status === 'vendu' ? 'bg-green-100 text-green-700' : 
                                    p.status === 'donne' ? 'bg-red-100 text-red-700' : 
                                    'bg-blue-100 text-blue-700';
                
                const netColor = p.net > 0 ? 'text-green-600 font-bold' : 
                                 p.net < 0 ? 'text-red-600 font-bold' : 'text-slate-400';

                const row = `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-6 py-4"><span class="${statusColor} px-2 py-0.5 rounded text-[10px] font-bold uppercase">${p.status.replace('-', ' ')}</span></td>
                        <td class="px-6 py-4 font-medium italic">${p.name}</td>
                        <td class="px-6 py-4 text-slate-500 text-xs">${p.source}</td>
                        <td class="px-6 py-4 text-slate-600">${p.buy.toFixed(2)}€</td>
                        <td class="px-6 py-4 text-slate-600">${p.sell > 0 ? p.sell.toFixed(2) + '€' : '-'}</td>
                        <td class="px-6 py-4 text-right ${netColor}">${p.net !== 0 ? (p.net > 0 ? '+' : '') + p.net.toFixed(2) + '€' : '-'}</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        function filterStatus(status) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderTable(status);
        }

        // Initial render
        renderTable();
    </script>
</body>
</html>
