        function renderTable(filter = 'all') {
            const tbody = document.getElementById('inventoryBody');
            tbody.innerHTML = '';
            
            products.forEach(p => {
                if (filter !== 'all' && p.status !== filter) return;

                const statusColor = p.status === 'vendu' ? 'bg-green-100 text-green-700' : 
                                    p.status === 'donne' ? 'bg-red-100 text-red-700' : 
                                    'bg-blue-100 text-blue-700';
                
                const netColor = p.net > 0 ? 'text-green-600 font-bold' : 
                                 p.net < 0 ? 'text-red-600 font-bold' : 'text-slate-400';

                const row = `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-4 py-3 md:px-6 md:py-4"><span class="${statusColor} px-2 py-0.5 rounded text-[9px] font-bold uppercase">${p.status.replace('-', ' ')}</span></td>
                        <td class="px-4 py-3 md:px-6 md:py-4 font-medium italic">${p.name}</td>
                        <td class="px-4 py-3 md:px-6 md:py-4 text-slate-500 text-[10px] md:text-xs">${p.source}</td>
                        <td class="px-4 py-3 md:px-6 md:py-4 text-slate-600 text-[10px] md:text-sm">${p.buy.toFixed(2)}€</td>
                        <td class="px-4 py-3 md:px-6 md:py-4 text-slate-600 text-[10px] md:text-sm">${p.sell > 0 ? p.sell.toFixed(2) + '€' : '-'}</td>
                        <td class="px-4 py-3 md:px-6 md:py-4 text-right ${netColor}">${p.net !== 0 ? (p.net > 0 ? '+' : '') + p.net.toFixed(2) + '€' : '-'}</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        function filterStatus(status) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderTable(status);
        }
